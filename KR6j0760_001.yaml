body:
  text: 淨口真言唵修唎修唎摩訶修唎修修唎娑婆訶淨身真言唵哆唎哆唎咄侈唎咄咄哆唎娑婆訶淨手真言唵住佉羅耶娑婆訶以上俱念三遍入壇三禮先敷具胡跪拈香起立執爐想云志心信禮准提大菩薩住妙月輪三摩地面圓如滿月身分十八臂現慈悲坐蓮臺持寶器體掛珠瓔珞胸藏題卍字八大菩薩恆繞護開大總持門諸緣皆濟度願同歸妙真如正覺路想已長跪作梵唱云大慈大悲憫衆生大喜大捨濟含識相好光明以自嚴衆等志心歸命禮一心奉請南無常住十方佛南無常住十方法南無常住十方僧每位長跪執爐三請一叩首下倣此南無七俱胝佛母尊那九界菩薩南無無相法界菩薩南無佛頂大輪菩薩南無不動尊王菩薩南無聖觀自在菩薩南無不空䌇菩薩南無聖金剛手菩薩南無伊迦惹吒菩薩南無嚩囉曩契菩薩南無戲縵歌舞菩薩南無香花燈塗菩薩南無鈎䌇鎖鈴菩薩南無甘露軍吒利菩薩南無烏樞瑟摩菩薩南無聖降三世菩薩南無准提會上諸尊菩薩摩訶薩南無祖師龍樹菩薩南無北辰妙見菩薩南無內部大威杜將主菩薩南無聖孫那哩將主菩薩南無頂行將主菩薩南無聖軍吒唎將主菩薩南無聖矜羯囉將主菩薩南無聖𠶜吒𠷉將主菩薩南無阿梨智母將主菩薩南無乾闥婆王將主菩薩南無灌頂部主菩薩南無穢跡金剛菩薩南無明蛇使者菩薩南無護法諸天一切聖聚請已白云弟子某甲持誦七俱胝佛母尊那菩薩大准提陀羅尼祈求悉地惟願十方三寶諸大菩薩無量聖衆加持護念願得隨意所求悉地圓滿白已讚云佛身充滿於法界普現一切羣生前隨緣赴感靡不周而常處此菩提座志心歸命禮大慈大悲本尊教主七十七俱胝正等覺一拜後同菩薩面圓如滿月黃金白色相端嚴我今頂禮誓歸依願覩尊顏常供養志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩面具三目相四大海水等澄清我今頂禮誓歸依願得五種眼清淨志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩耳鐺寶嚴飾種種殊勝巧莊嚴我今頂禮誓歸依願得耳通聞妙法志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩胸藏題卍字妙圓月相現光明我今頂禮誓歸依願得心通聞了悟志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩花冠嚴頂上冠中化現五如來我今頂禮誓歸依願得慈尊親灌頂志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩天衣逾潔白六銖掛體勝莊嚴我今頂禮誓歸依願得善哉解脫服志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩身掛珠瓔珞臂指環釧寶莊嚴我今頂禮誓歸依願具如來四八相志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩端坐蓮華座巍巍不動若金山我今頂禮誓歸依願當來坐菩提座志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩遍身諸支分常放無量大光明我今頂禮誓歸依願得慧光來護念志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手作說法印表示善說一切法我今頂禮誓歸依願得諸法悉通達志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持妙寶幢表示世間為最勝我今頂禮誓歸依願我能建大法幢志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩作無畏印提携險難諸衆生我今頂禮誓歸依願我速離諸恐怖志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持妙蓮花表示六根常清淨我今頂禮誓歸依願我離垢如蓮華志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持智慧劒能斷煩惱諸結縛我今頂禮誓歸依願我貪嗔癡能斷志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持灌澡瓶流出甘露潤衆生我今頂禮誓歸依願我常蒙佛灌頂志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持妙寶鬘種種嚴飾最殊勝我今頂禮誓歸依願我得繫妙法繒志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持金剛䌇善能引入於一切我今頂禮誓歸依願我得入相應法志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持天妙果表示菩提果圓成我今頂禮誓歸依願我廣修諸善果志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持八輻輪威光照耀於三界我今頂禮誓歸依願我常轉大法輪志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持大鉞斧能破堅固不善法我今頂禮誓歸依願我擊碎人我山志心歸命禮大慈大悲本尊教主七俱胝佛母尊那菩薩摩訶薩菩薩手持大法螺一音清震三千界我今頂禮誓歸依願我能說一切法志心歸命禮此下照前拜念大慈大悲本尊教主等云菩薩手持金剛鈎善能鈎召於一切我今頂禮誓歸依願我成就鈎召法志心歸命禮照前拜念菩薩手持如意瓶流出寶藏及經典我今頂禮誓歸依願我受用常如意志心歸命禮照前拜念菩薩手持金剛杵天龍八部咸歸仰我今頂禮誓歸依願我調伏難調者志心歸命禮照前拜念菩薩手持般若經中含甚深微妙義我今頂禮誓歸依願我無師自然覺志心歸命禮照前拜念菩薩手持摩尼珠光明圓潔無瑕翳我今頂禮誓歸依願我心地活潑潑志心歸命禮照前拜念佛母尊那大菩薩現十八臂坐壇中八大菩薩護八方弟子一心歸命禮志心歸命禮照前拜念已上諸位隨偈解相禮時作觀惟首尊總具相好百七十七俱胝數佛同時顯現受我敬禮末尊應觀一身十八臂有八菩薩圍繞八方餘隨偈作觀重在手持何物志心歸命禮大慈大悲本尊教主無相法界菩薩摩訶薩先唱偈然後頂禮餘倣此無相法界大菩薩三十二相遍莊嚴分身塵剎化衆生弟子一心歸命禮志心歸命禮大慈大悲本尊教主佛頂大輪菩薩摩訶薩佛頂大輪大菩薩三頭六臂現威神嚴持器仗伏邪魔弟子一心歸命禮志心歸命禮大慈大悲本尊教主不動尊王菩薩摩訶薩不動尊王大菩薩毗盧遮那佛化身手持劍䌇護輪壇弟子一心歸命禮志心歸命禮大慈大悲本尊教主聖觀自在菩薩摩訶薩聖觀自在大菩薩蓮華部主最勝王尋聲救苦大慈悲弟子一心歸命禮志心歸命禮大慈大悲本尊教主不空䌇菩薩摩訶薩不空䌇大菩薩鼻噓火𦦨頂龍王觀音菩薩所化身弟子一心歸命禮志心歸命禮大慈大悲本尊教主聖金剛手菩薩摩訶薩聖金剛手大菩薩大力忿怒持明王善能調伏諸惡魔弟子一心歸命禮志心歸命禮大慈大悲本尊教主伊迦惹吒菩薩摩訶薩伊迦惹吒大菩薩身大青色象皮衣不違本誓護准提弟子一心歸命禮志心歸命禮大慈大悲本尊教主嚩囉曩契菩薩摩訶薩嚩囉曩契大菩薩現大威力役龍神復能除毒救衆生弟子一心歸命禮志心歸命禮大慈大悲本尊教主戲縵歌舞菩薩摩訶薩戲縵歌舞大菩薩行罡步斗鎮九洲蕩除惡業驅邪魔弟子一心歸命禮志心歸命禮大慈大悲本尊教主香花燈塗菩薩摩訶薩香花燈塗大菩薩馥郁照曜於四方諸邪聞見斂威容弟子一心歸命禮志心歸命禮大慈大悲本尊教主鈎䌇鎖鈴菩薩摩訶薩鈎䌇鎖鈴大菩薩手持法器鎮北方群魔惡鬼悉潛藏弟子一心歸命禮志心歸命禮大慈大悲本尊教主甘露軍吒唎菩薩摩訶薩甘露軍吒唎大菩薩加持法水淨壇場辟除魔障護行人弟子一心歸命禮志心歸命禮大慈大悲本尊教主烏樞瑟摩菩薩摩訶薩烏樞瑟摩大菩薩消除穢惡辟群魔淨不淨處悉現身弟子一心歸命禮志心歸命禮大慈大悲本尊教主聖降三世菩薩摩訶薩聖降三世大菩薩大力忿怒持明王善能調伏諸惡魔弟子一心歸命禮志心歸命禮大慈大悲我等祖師龍樹菩薩摩訶薩祖師龍樹大菩薩開持明藏示衆生得聞妙法感祖恩弟子一心歸命禮志心歸命禮大慈大悲護法北辰妙見菩薩摩訶薩北辰妙見大菩薩身現五住金剛神手持寶劍伏妖魔弟子一心歸命禮志心歸命禮大慈大悲內部大威杜將主菩薩摩訶薩大威將主杜菩薩內壇教主護准提飛騰九地顯神通弟子一心歸命禮志心歸命禮大慈大悲內部將主聖孫那哩菩薩摩訶薩聖孫那哩大菩薩三頭六臂現金光慈悲普濟大乾坤弟子一心歸命禮志心歸命禮大慈大悲頂行將主菩薩摩訶薩頂行將主大菩薩統領諸真護准提手持寶杵伏妖魔弟子一心歸命禮志心歸命禮大慈大悲本尊教主聖軍吒唎將主菩薩摩訶薩聖軍吒唎大菩薩外壇護法廣威靈手持戟杵鎮壇場弟子一心歸命禮志心歸命禮大慈大悲聖矜羯囉菩薩摩訶薩聖矜羯囉大菩薩手持妙果度衆生尋聲接引大慈悲弟子一心歸命禮志心歸命禮大慈大悲聖𠶜叱迦菩薩摩訶薩聖𠶜叱迦大菩薩忿怒妙相震八方赤心火𦦨百邪驚弟子一心歸命禮志心歸命禮大慈大悲阿梨智母菩薩摩訶薩阿梨智母大菩薩五百神靈屬降生愛子真童隨聖身弟子一心歸命禮志心歸命禮大慈大悲乾闥婆王菩薩摩訶薩乾闥婆王大菩薩降魔見性現金身豹冠龍劍象巍蛾弟子一心歸命禮志心歸命禮大慈大悲灌頂部主菩薩摩訶薩灌頂部主大菩薩廣施甘露潤衆生十方善信悉沾霖弟子一心歸命禮志心歸命禮大慈大悲穢跡金剛菩薩摩訶薩穢跡金剛大菩薩縱橫變化伏邪魔地水火風悉現形弟子一心歸命禮志心歸命禮大慈大悲明蛇使者菩薩摩訶薩明蛇使者大菩薩天醫內院顯威靈消灾除病救衆生弟子一心歸命禮志心歸命禮大慈大悲護法諸天一切聖衆護法諸天諸聖衆十方圍繞護輪壇不忘自部獻印明助我闡揚准提法稽首歸依蘇悉地跪念頭面頂禮七俱胝我今稱讚大准提惟願慈悲垂加護曩謨薩哆喃三藐三菩䭾俱胝喃怛致陀唵折唎主唎准提娑嚩賀或一或三或七遍伺出壇在觀堂持百八遍願佛慈悲求懺悔志心懺悔弟子某甲自從無始曠大劫來至於今日迷無我覺計有我人我計既興常緣我所根塵浩繞識蔭奔波繫動身心猶如電轉清淨眼耳鼻舌身意一念不覺翻作六師偷法王財共邊見賊賊既熾盛破涅槃城殘害法身焚燒慧命如是等罪數越塵沙從迷至迷莫測終始今始覺悟深愧自慚曉夜驚惶身心戰栗永斷迷覺貪愛我人投涅槃城歸安樂國以無我覺降伏六師收法王財納三堅藏資給慧命增益法身燃法性燈常照無盡行願事理塵界不違三寶三乘誓當弘護迷覺之罪隨懺消除願從今日乃至菩提念念堅固念念精進身心自在辨說無礙於一念中具一切智須知諸法畢竟空寂而常度脫一切衆生同證涅槃不以涅槃為證大輪明王滅罪真言南無悉地哩野地尾迦喃薩哩嚩呾哆孽哆喃唵微囉枳微囉枳摩訶斫羯囉曰惹曰唧哩薩埵薩埵娑囉底娑囉底怛囉異怛囉異尾哆摩𩕳三般左𩕳怛囉摩尼悉多孽哩野怛囕焰娑婆訶懺悔已志心歸命禮常住三寶志心發願願我所修行一切諸善果禮念歸懺力回施諸有情出離三界苦速證於菩提回向我所求助成勝悉地發願回向已志心歸命禮常住三寶歸依諸如來四句一拜五智十身佛願共諸衆生同入金剛界歸依最上乘瑜伽祕密教願共諸衆生同入金剛界歸依不退轉大悲菩薩僧願共諸衆生同入金剛界歸依三寶已所有諸功德回施諸有情共成無上道上來頂禮大准提菩薩焚修悉地懺悔玄文功德圓滿無限良因散沾沙界和南聖衆行者入觀誦持時先當了知諸佛衆生與我此心同一圓明竪窮橫遍現前一念具足無減無二無別而恆安住甚深境界慈念有情以三密相應而作悉地然持中所示觀雖多無越梵字呪聲總相別相又復遠離能觀所觀能持所持一事一理皆是不思議祕密理境如是行持何愁佛果不圓罪障不滅悉地不成耶順治壬辰季夏佛弟子項謙法名弘慈從閩中三山虔摹薰沐重鐫
