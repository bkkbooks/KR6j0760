body:
  text: 重梓佛母准提焚修悉地懺悔玄文序准提菩薩以威神之德濟渡羣迷洪宣心呪於是慧根鈍質得無畏定力降伏魔怨直見本來豈止方便一門現大神通俾其獲福已哉然而獲福正自無量余先襄毅公自幼奉持心不退轉以是從布衣擢高第土木之變扈駕北狩出百死間關萬里自後深沐恩眷服繡衣秉威鉞削平宼亂鎮撫華夷雖藎誠失自性生然每于艱險處顯𫎇佑庇簪纓累葉歷有祥徵先君蘭齋公虔持一生梓有准提儀軌鑄施准提寶鏡一百八座仕至極品墮水不濡遇宼辟易予亦遵奉受持罔懈早試思賦青雲父命應襲謬叨天錫文廕金吾甲申人日夢山石崩飛潛身無地聞空中語曰但持我呪爾難可免三月十九日闖賊陷京余率家丁巷戰銛予刺胸依不受損徒步奔南屢遇暴不能害已而拜屯田戎副監寧南矦軍渡洞庭湖颶風起舟幾覆不入死自念身微福薄菩薩慈悲種種相協遂發願普同有情登彼極樂後張公完真陳公天章相繼總制浙閩賴菩薩能仁啟廸從幕下克全萬萬生命兩公交章功予題授漳之別駕託以撫循迨壬辰瓜代甫離三日而漳受圍不及難由是觀之持呪功德豈淺鮮哉先余入閩謁隱空和尚于廣濟寺也見准提焚修悉地寶懺并繪護法諸真得未曾有詢其事最奇國初時有夏道人者業織每夜心怖遇老僧授呪懺云持之可無怖能解說一日織次抒落地還在手如是者再忽現諸壇將拜而問之告曰汝心誠大聖命我護乃懸鏡懇禱迓繪工次第從鏡中圖像此懺法所自始也後道人坐脫肉身供養福州余往瞻禮得請其懺文并圖像歸亦異數云夫情緣未斷舉動生愆欲證菩提先除舊業故知求福即是愆端能悔方膺福報葢本覺顯照具有神通炎火變於青蓮苦海易於甘露是准提菩薩與護法諸真皆其自心現相獲福寧有量乎爰授剞劂流傳天下願持呪懺者直下承當而已壬辰季夏三教弟子項謙法名弘慈盥手焚香敬序五月初十日准提菩薩聖誕佛母准提焚修悉地儀文寶懺序埽道人默甞閱大藏中准提經有三譯一名佛說七俱胝佛母心大准提陀羅尼經唐武周沙門地婆訶羅譯約一千六百餘字一名佛說七俱胝佛母准提妙明陀羅尼經并念誦觀行等法唐天竺三藏金剛智譯視地婆訶羅所譯其字約多六倍一名七俱胝佛母所說准提陀羅尼經唐特進試鴻臚卿大興善寺三藏沙門大廣智不空奉詔譯視金剛智所譯字約相等其經文呪語篇章長短既大懸絕句字差別復難會通藏本又有七俱胝佛母心大准提呪與三譯所載音字俱異又世本有番准提呪字句更異並可莊嚴轉閱存而不論者也至於布像結契梵書筆畫三譯及世本無一印合約略現相執持以不空譯為正若根本身契以地婆金剛二譯為正而梵字梵音傳譌舛錯諸本授梓流傳異同不可究詰其最先入藏頒行者無如宋道法師顯密圓通成佛心要集上下二卷先言顯脩後言密脩謂顯脩者參禪以至見性成佛密脩者但能致心專誦陀羅尼真言依秘密之法加持身心便得速成佛道所求皆遂又說七持三密法甚詳三密者身密結印口密誦呪意密作觀也又謂准提為大總持呪法獨部別行能含攝佛部諸呪蓮華部諸菩薩呪金剛部諸神呪寶部諸天呪羯磨部諸鬼神呪五部中部各為五二十五部一切諸呪無不攝者諸呪不攝准提如大海能攝百川百川不攝大海即其中六字妙明真言是觀世音微妙本心與准提次第相須有七十七俱胝佛一時現前同聲宣說依經梵本有十萬偈龍樹菩薩勘成持明儀軌為震旦所宗自餘諸呪先須持戒方得誦習此呪不論染淨惟當專持俾中下根器易於獲益是名呪王誠不思議導迷方便也明萬曆間有淨居潔大師輯顯密要言一卷天啟間古虔青蓮居士謝于教編輯准提淨業三卷序謂所編即顯密圓通之旨而首及布字法先持誦而後觀行又以多字難觀且以一字攝之一字者梵書淨法界真言㘕字曲為初幾一多無礙此編之功在准提者不小也准提刻本行世者不可勝記士大夫受持徵驗者亦不可勝記如淨業所載給諫賀少龍久持此呪一夕夢童子送九華衣遂得生天部郎袁了凡先生黃艱於科第自記云先求鄉舉立願滿三千善次求進賢立願滿一萬善究竟取效准提以見靈驗則知非立志行善省身改過習行方便之人不得謂佛菩薩有虗語也即如吾里中項氏一門從准提持明得力自襄毅公忠始公當土木北狩出百死而成大勳平宼亂而膺世蔭以至大金吾蘭齋公俊卿凌風波而飭鑾衛捍邊彊而登極品喆嗣牧公謙值滄桑陵谷之變遷攖闖賊巷戰之險難既渡湖颶而職屯戎因去金吾而晉別駕輯寧撫循全活無算瓜期解綬危城不嬰良以忠孝世篤文行性成故自襄毅金吾以至閩漳別駕代能受持准提穀自天澹災集福此明效大驗在目前無疑義者蘭齋公畢生虔持梓有准提儀軌鑄施准提寶鏡而牧公克世其業會有天授從入閩時得此准提焚修悉地寶懺儀文及諸法像神圖於廣濟寺隱空和尚隱公傳自明初夏道人感老僧授懺文天神授鏡像後真人坐脫肉身供養福州此尤不思議大因緣而牧公為之虔摹繡梓偕入藏冊流通具見濟世利生箕裘世讚之大願力矣而埽道人之得瞻禮敘讚此刻自信於准提曾非小小因緣自庚戌年二十一歲為雪嶠禪師結千指庵於經山遇貝林法師在殿後山菴中能以竹筆匾樣如篦刷者慣作梵書因乞書准提呪覿面縱橫成字傳本特真并授二合彈舌梵音時從雲捿大師授記散持已閱三載始解二合彈舌之義歸而勒梵書於石存三塔大乘堂中受持六載歲至丙辰六月遂有梁生之奇驗時居北門菩薩橋椿樹頭大樓中暑臥簟上忽樓三間齊圮巨梁巨棟巨磚巨瓦堆垛傾頺反藉三大梁架立遮護其梁皆去身不寸瓦礫著身輕如紙樸余時惟高聲持呪久之得出如夢中事無纖毫剝膚之災則余二十七歲時事也適是冬憨山國師東遊至徑山茶毗紫柏尊者入塔於寂照菴後余亟走皈依得示梁生偈語因更字焉聞子將嚴印持顏生生諸道友聞余持明得力萬死一生偕設大供於武林淨慈宗鏡堂延請憨師說受持准提法憨師上堂痛切授記復入室示以根本身契與刻傳手印堅固逈別更示以九聖梵字觀門令攝入㘕之一字又示以唵字梵音作吼聲如饑虎吞物動搖山嶽氣盡乃已㘕之一字閉口彈舌作鼻音如壯士怒咄葢去聲非平聲也又云但辦一片肯切心不淨處即得淨不得間斷一日即千日難補十齋日即准提齋日亦不得間斷一日非千日可補在家居士五欲濃厚惟此一門最易得力此憨師親口授記今肉身現在曹溪進香者咸稱七祖也當日受持士庶合四十餘人到底歷今四十餘年不間一日如法受持者獨埽道人一人曾於里中宣公橋俗名油罈最深者昏夜宴歸船傍墮水許久濡衣而出於大江燕子磯俗名野雞頭最險者失風觸石船破幾沉竟得沮袽而免又於德州北御河駛流中盜擁入舟拔刀相向連退數武復擁出舟推墮河心忽到彼岸水僅濡足盜去還舟急湍百尺有童永雋汩沒無影爾時惟知持呪不知其他陷險如夷不遑殫述即如乙酉兵燹東塔西有藥山園奉供准提栴檀像於龍樹檀一時山房焚劫靡遺獨像之一出一還若有神焉司之今尚供研山知津閣也又如丁元公淨伊禪師為居士時曾為余依不空譯寫准提像於藥山園中開光之日忽有骨董家以准提真言梵書舊紅牙軸梵書古甆罏銅香盒來助裝潢供養者並感召中不思議事是日中秋雪嶠大師開堂東塔過觀歎云好一片梵呪法界遂成二律和者累百元公精禪理兼工圖篆工楷法因久寓此園為余備集准提法門種種顛末手書成帙積且寸許題云正入不思議法門品又䟦云若能證此秘密法門時便於日用一切境界中悉以不思議應不戒自戒不施自施如是乃至不智慧自智慧不萬行自萬行不三心自三心故為成就不思議法門不歷劫位現身成佛也淨伊禪師述義如此余且什襲藏之而余疇昔所序刻准提亦既數數矣一為吳門聖恩寺沙門弘壁作准提懺願儀梵本䟦一為同藉瑞安林太史任先增志作准提集說序一為蜀綿劉信淨宇烈准提緣亦名淨因集苕上閔學憲弘復度所梓序一為同藉會稽張太史受菴星所分輯准提掌果宣城梅中翰生生士生所梓序一為素華旭大師作准提持法序一為四明周臺所輯簡易持誦法箬菴問禪師所定馮總鎮子淵源淮所梓序一為中原周中丞元亮亮工弟亮節作准提經三譯兼行序大抵諸刻皆原本於顯密圓通而加意損益之其謂以淨而靈以信而入佛法皆然不獨准提若夫令人橫出三界疾趨菩提自利利他確有赫驗則無如准提者真所謂異方便也或以持准提者曲遂希望之心為嫌則念佛希望往生參禪希望悟道圓宗密教機用皆同觀音鈔云雖念念求而無能求所求之相則如觀法布輪月於一心安明珠於眾體即是吾夫子洗心退藏於密齋戒以神明其德之義又非可以諸別呪成就相同論也埽道人於戊辰歲受職都門蘭齋項翁往還綦密相與揚確所梓准提儀軌茲復得與嗣君牧公矜式玄文實出希有更涓茲仲春六日就項氏本支薙染為同塵開士者啟建懺壇於賢谿之太平菴更為創舉殊勝道場一時多緇白詞家各作准提三目十八臂頌如是准提妙果一經一緯一始一終而五大部陀羅尼之總持斯在襄毅公之堂構式靈貽謀燕翼者斯在埽道人特為吐露生平夙因勝事以表准提神通勸請觀誦聊當受持諸同志一部法門鼓吹云爾順治丁酉仲春朔日國子司業前戊辰二甲進士紫霄飛仙裔孫曹溪憨祖受持弟子福徵道一居士埽菴譚貞默槃談撰時年六十八歲佛母準提脩懺儀序觀夫天下人物莫不有此靈心在法界中以各因所引所感故有種種差別以交錯成此凡聖之文而佛聖之設教利生亦各因其所近以導引之感激之使彼各自原其始返其終而不失其性情之正然此更有世法出世法之方便至如諸佛菩薩充滿剎塵獨有觀音與準提之救世最為靈應而法界中亦無一人不知有觀音與準提者正以準提即觀音之普門示現也不見其呪先以觀音妙明王真言冠其首以準提真言成其終葢此呪乃法界秘密藏中之三昧王能出生諸佛菩薩之智德莊嚴以故稱之為佛母以準此凡聖之情提此遮那之性為主中主之鏡印也惟此菩薩有必救之心以故群靈有必求之信使此無感應則盡法界無有肯信受也持呪與念佛全同惟參禪則稍異呪以信為主禪以疑為端信極則無疑而直入疑極則必信而頓通在持呪與念佛決不許疑稍疑則如輪刀上陣而志不勇猛必自取敗也而參禪雖曰疑情而先必深信有教外別傳之旨但不知古人言句之異而猛欲發明之為疑也非謂疑此或有或無不可必也若如此疑則又是信之極求之切也又何始終之不同哉此中有二義一利於童蒙以其心無雜慮但恐彼無求心能有求心則推開秘藏光燦天然矣二忌於聰明以其心多散亂不能專銳一心如能一心則全收法界體露真常矣以故聖學以顏曾之愚魯獨得心傳而游夏之文華難於入室況持此呪獨以收攝身意口之放心於三相應處退藏於密而默識貫通於參贊位育也誰謂佛教不與聖學相表裏哉然則儒宗自有克己慎獨足矣何必更持佛呪乎曰從來諸儒專以世教為事而未肯於身心性命中求透露至遇生死危難水火刀兵中得大神通解脫之機用者幾人哉正以彼志不在生死性命是故借此呪力以引導之如有別傳大藥能療萬病亦必有藥引始能道達於五臟六腑十二經絡而通乎風寒暑濕表裏虗實使無此引則閉塞而不能自達也以故準提稱為佛母如母能救子子能求母則兩得之矣如子不專心求母則母徒有倚門而悲耳天下群情各有志願之所到即是藥引之所到至於却病延年脫胎換骨與起死迴生超凡越聖又在引之淺深與志之勇怯也又若蒙者陷於無憤無求或為五欲所引聰者陷於偷心傍瞥或為異端所迷即有求而非關性命即有持而不專久常不求正法而能證真決無是也惟久持此呪最能啟蒙攝聰速應危險之求神化魔冤之業此非所謂秘密金剛王哉嘉禾項牧公居士素承家學淵源忠孝名世獨於準提得其法脉常較梓其修禮法儀而譚埽翁詳為序其顛末深得顯密圓通之旨也今吾燈侍者是其嫡侄因得讀吾充智證傳大有感激於宗門綱要而參禮於予敘從前親石頭余集翁之機緣且請序此法儀以表揚其感引道交之旨予以設壇修懺須恊眾人之力而有時若要直捷易精只須持此一呪而無間則亦不負上承下仰之法可速得成就此王三昧也因是曲為之闡發云寓龍淵浪杖人道盛題
